# =============================================================================
# PostgreSQL - Manager Database
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: smart-redact-manager-db
  namespace: smart-redact
  labels:
    app.kubernetes.io/name: smart-redact
    app.kubernetes.io/component: manager-db
spec:
  serviceName: smart-redact-manager-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smart-redact
      app.kubernetes.io/component: manager-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smart-redact
        app.kubernetes.io/component: manager-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: smartredact
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smart-redact-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              value: smartredact
            - name: TZ
              value: UTC
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "smartredact"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "smartredact"]
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: smart-redact-manager-db
  namespace: smart-redact
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app.kubernetes.io/name: smart-redact
    app.kubernetes.io/component: manager-db
---
