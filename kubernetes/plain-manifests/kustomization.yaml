# =============================================================================
# Smart Redact - Kustomize Configuration
# =============================================================================
# Usage:
#   kubectl apply -k .                     # apply all resources
#   kubectl kustomize . | kubectl diff -f -  # preview changes
#
# To customize, create overlays:
#   overlays/production/kustomization.yaml
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: smart-redact

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - storage.yaml
  - postgres.yaml
  - worker.yaml
  - manager.yaml
  - orchestrator.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: smart-redact

images:
  - name: pdftoolsag/smart-redact-manager
    newTag: latest
  - name: pdftoolsag/smart-redact-worker
    newTag: latest
  - name: pdftoolsag/smart-redact-orchestrator
    newTag: latest
