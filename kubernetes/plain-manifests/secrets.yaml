# =============================================================================
# Smart Redact Secrets
# =============================================================================
# IMPORTANT: Do NOT commit this file with real values to version control.
#
# All four values MUST be set before `kubectl apply`. The placeholders below
# are intentionally not valid base64 so that applying this file unmodified
# fails loudly instead of deploying with insecure defaults.
#
# Option 1 - Create via kubectl (recommended, skip applying this file):
#   kubectl create secret generic smart-redact-secrets \
#     --namespace smart-redact \
#     --from-literal=license-key="<your-license-key>" \
#     --from-literal=encryption-key="$(openssl rand -base64 32)" \
#     --from-literal=jwt-secret="$(openssl rand -base64 64 | tr -d '\n')" \
#     --from-literal=postgres-password="$(openssl rand -base64 32 | tr -d '=+/' | head -c 32)"
#
# Option 2 - Apply this file with base64-encoded values:
#   echo -n "your-value" | base64
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: smart-redact-secrets
  namespace: smart-redact
type: Opaque
data:
  license-key: REPLACE_WITH_BASE64_LICENSE_KEY
  encryption-key: REPLACE_WITH_BASE64_ENCRYPTION_KEY
  jwt-secret: REPLACE_WITH_BASE64_JWT_SECRET
  postgres-password: REPLACE_WITH_BASE64_POSTGRES_PASSWORD
