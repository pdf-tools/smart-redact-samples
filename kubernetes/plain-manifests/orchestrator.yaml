apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-redact-orchestrator
  namespace: smart-redact
  labels:
    app.kubernetes.io/name: smart-redact
    app.kubernetes.io/component: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smart-redact
      app.kubernetes.io/component: orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smart-redact
        app.kubernetes.io/component: orchestrator
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
      containers:
        - name: orchestrator
          image: pdftoolsag/smart-redact-orchestrator:0.99.0
          ports:
            - containerPort: 9983
          env:
            - name: ManagerApi__BaseUrl
              valueFrom:
                configMapKeyRef:
                  name: smart-redact-config
                  key: ORCHESTRATOR_MANAGER_URL
            - name: ManagerApi__PollingIntervalSeconds
              valueFrom:
                configMapKeyRef:
                  name: smart-redact-config
                  key: ORCHESTRATOR_POLLING_INTERVAL
            - name: Database__DatabaseType
              valueFrom:
                configMapKeyRef:
                  name: smart-redact-config
                  key: ORCHESTRATOR_DB_TYPE
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smart-redact-secrets
                  key: postgres-password
            - name: Database__ConnectionString
              value: "User ID=smartredact;Password=$(POSTGRES_PASSWORD);Server=smart-redact-orchestrator-db;Port=5432;Database=smartredact;Maximum Pool Size=50;Timeout=30;"
            - name: Jwt__SecretKey
              valueFrom:
                secretKeyRef:
                  name: smart-redact-secrets
                  key: jwt-secret
            - name: Licensing__LicenseKey
              valueFrom:
                secretKeyRef:
                  name: smart-redact-secrets
                  key: license-key
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: 9983
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 9983
            periodSeconds: 10
            timeoutSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 9983
            periodSeconds: 30
            timeoutSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: smart-redact-orchestrator
  namespace: smart-redact
spec:
  type: ClusterIP
  ports:
    - port: 9983
      targetPort: 9983
      name: http
  selector:
    app.kubernetes.io/name: smart-redact
    app.kubernetes.io/component: orchestrator
