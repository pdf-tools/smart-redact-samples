apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-redact-worker
  namespace: smart-redact
  labels:
    app.kubernetes.io/name: smart-redact
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smart-redact
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smart-redact
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        fsGroup: 1654
        runAsNonRoot: true
        runAsUser: 1654
      containers:
        - name: worker
          image: pdftoolsag/smart-redact-worker:0.99.0
          ports:
            - containerPort: 4885
          env:
            - name: Licensing__LicenseKey
              valueFrom:
                secretKeyRef:
                  name: smart-redact-secrets
                  key: license-key
            - name: Encryption__EncryptionKey
              valueFrom:
                secretKeyRef:
                  name: smart-redact-secrets
                  key: encryption-key
            - name: Encryption__DekTokenTtlMinutes
              valueFrom:
                configMapKeyRef:
                  name: smart-redact-config
                  key: DEK_TTL_MINUTES
            - name: FileStorage__FileStorageType
              valueFrom:
                configMapKeyRef:
                  name: smart-redact-config
                  key: FILE_STORAGE_TYPE
            - name: FileStorage__FilesDirectoryPath
              valueFrom:
                configMapKeyRef:
                  name: smart-redact-config
                  key: FILE_STORAGE_PATH
          volumeMounts:
            - name: storage
              mountPath: /app/storage_folder
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: 4885
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 4885
            periodSeconds: 10
            timeoutSeconds: 30
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 4885
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: smart-redact-storage
---
apiVersion: v1
kind: Service
metadata:
  name: smart-redact-worker
  namespace: smart-redact
spec:
  type: ClusterIP
  ports:
    - port: 4885
      targetPort: 4885
      name: http
  selector:
    app.kubernetes.io/name: smart-redact
    app.kubernetes.io/component: worker
