apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-redact-hitl-web
  namespace: smart-redact
  labels:
    app.kubernetes.io/name: smart-redact
    app.kubernetes.io/component: hitl-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smart-redact
      app.kubernetes.io/component: hitl-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smart-redact
        app.kubernetes.io/component: hitl-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
      containers:
        - name: hitl-web
          image: pdftoolsag/smart-redact-hitl-web:0.99.0
          ports:
            - containerPort: 8080
          env:
            - name: ORCHESTRATOR_HOST
              value: smart-redact-orchestrator
            - name: VITE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-redact-config
                  key: HITL_WEB_ORCHESTRATOR_URL
            - name: VITE_MANAGER_API_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-redact-config
                  key: HITL_WEB_MANAGER_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: smart-redact-hitl-web
  namespace: smart-redact
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 8080
      name: http
  selector:
    app.kubernetes.io/name: smart-redact
    app.kubernetes.io/component: hitl-web
