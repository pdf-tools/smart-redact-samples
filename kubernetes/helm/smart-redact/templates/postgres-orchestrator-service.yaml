{{- if and .Values.postgresOrchestrator.enabled .Values.orchestrator.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: smart-redact-orchestrator-db
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smart-redact.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator-db
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    {{- include "smart-redact.selectorLabels" (dict "component" "orchestrator-db" "Release" .Release) | nindent 4 }}
{{- end }}
