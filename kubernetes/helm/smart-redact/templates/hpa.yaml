{{- if .Values.autoscaling.manager.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: smart-redact-manager-hpa
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smart-redact.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: smart-redact-manager
  minReplicas: {{ .Values.autoscaling.manager.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.manager.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.manager.targetCPUUtilizationPercentage }}
{{- end }}
---
{{- if .Values.autoscaling.worker.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: smart-redact-worker-hpa
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smart-redact.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: smart-redact-worker
  minReplicas: {{ .Values.autoscaling.worker.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.worker.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.worker.targetCPUUtilizationPercentage }}
{{- end }}
