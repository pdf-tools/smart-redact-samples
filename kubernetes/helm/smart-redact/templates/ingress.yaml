{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smart-redact-ingress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smart-redact.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.managerHost }}
        {{- if .Values.orchestrator.enabled }}
        - {{ .Values.ingress.orchestratorHost }}
        {{- end }}
        {{- if .Values.hitlWeb.enabled }}
        - {{ .Values.ingress.hitlWebHost }}
        {{- end }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.managerHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: smart-redact-manager
                port:
                  number: {{ .Values.manager.port }}
    {{- if .Values.orchestrator.enabled }}
    - host: {{ .Values.ingress.orchestratorHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: smart-redact-orchestrator
                port:
                  number: {{ .Values.orchestrator.port }}
    {{- end }}
    {{- if .Values.hitlWeb.enabled }}
    - host: {{ .Values.ingress.hitlWebHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: smart-redact-hitl-web
                port:
                  number: {{ .Values.hitlWeb.port }}
    {{- end }}
{{- end }}
