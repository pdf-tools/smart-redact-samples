{{- if .Values.postgresManager.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: smart-redact-manager-db
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smart-redact.labels" . | nindent 4 }}
    app.kubernetes.io/component: manager-db
spec:
  serviceName: smart-redact-manager-db
  replicas: 1
  selector:
    matchLabels:
      {{- include "smart-redact.selectorLabels" (dict "component" "manager-db" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smart-redact.selectorLabels" (dict "component" "manager-db" "Release" .Release) | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgresManager.image.repository }}:{{ .Values.postgresManager.image.tag }}"
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: smartredact
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretName }}
                  key: postgres-password
            - name: POSTGRES_DB
              value: smartredact
            - name: TZ
              value: UTC
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgresManager.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "smartredact"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "smartredact"]
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgresManager.storage.storageClass }}
        storageClassName: {{ .Values.postgresManager.storage.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgresManager.storage.size }}
{{- end }}
