{{- if .Values.orchestrator.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: smart-redact-orchestrator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smart-redact.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.orchestrator.port }}
      targetPort: {{ .Values.orchestrator.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "smart-redact.selectorLabels" (dict "component" "orchestrator" "Release" .Release) | nindent 4 }}
{{- end }}
