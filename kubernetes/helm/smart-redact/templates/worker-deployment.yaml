{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-redact-worker
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smart-redact.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "smart-redact.selectorLabels" (dict "component" "worker" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smart-redact.selectorLabels" (dict "component" "worker" "Release" .Release) | nindent 8 }}
    spec:
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 1654
        runAsNonRoot: true
        runAsUser: 1654
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag | default .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.worker.port }}
              protocol: TCP
          env:
            - name: Licensing__LicenseKey
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretName }}
                  key: license-key
            - name: Encryption__EncryptionKey
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretName }}
                  key: encryption-key
            - name: Encryption__DekTokenTtlMinutes
              valueFrom:
                configMapKeyRef:
                  name: smart-redact-config
                  key: DEK_TTL_MINUTES
            - name: FileStorage__FileStorageType
              valueFrom:
                configMapKeyRef:
                  name: smart-redact-config
                  key: FILE_STORAGE_TYPE
            - name: FileStorage__FilesDirectoryPath
              valueFrom:
                configMapKeyRef:
                  name: smart-redact-config
                  key: FILE_STORAGE_PATH
            {{- if .Values.worker.gpu.enabled }}
            - name: Inference__ExecutionProvider
              value: "Auto"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
            {{- end }}
            {{- if .Values.opentelemetry.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: smart-redact-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              valueFrom:
                configMapKeyRef:
                  name: smart-redact-config
                  key: OTEL_EXPORTER_OTLP_PROTOCOL
            {{- end }}
            {{- range $key, $value := .Values.worker.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: storage
              mountPath: /app/storage_folder
          resources:
            {{- with .Values.worker.resources.requests }}
            requests:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            {{- if or .Values.worker.resources.limits .Values.worker.gpu.enabled }}
            limits:
              {{- with .Values.worker.resources.limits }}
              {{- toYaml . | nindent 14 }}
              {{- end }}
              {{- if .Values.worker.gpu.enabled }}
              nvidia.com/gpu: {{ .Values.worker.gpu.count }}
              {{- end }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: {{ .Values.worker.port }}
            initialDelaySeconds: {{ .Values.worker.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.worker.healthcheck.periodSeconds }}
            failureThreshold: {{ .Values.worker.healthcheck.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.worker.healthcheck.path }}
              port: {{ .Values.worker.port }}
            periodSeconds: {{ .Values.worker.healthcheck.periodSeconds }}
            timeoutSeconds: {{ .Values.worker.healthcheck.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: {{ .Values.worker.port }}
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: smart-redact-storage
{{- end }}
