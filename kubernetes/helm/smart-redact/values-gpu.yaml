# =============================================================================
# Smart Redact - GPU Override Values
# =============================================================================
# Usage: helm install smart-redact ./smart-redact -f values-gpu.yaml
# =============================================================================

worker:
  image:
    tag: "0.99.0-cuda"
  gpu:
    enabled: true
    count: 1
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi
  # -- Schedule on GPU nodes
  nodeSelector:
    nvidia.com/gpu.present: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  extraEnv:
    Inference__ExecutionProvider: "Auto"
