# =============================================================================
# Smart Redact - Full Stack (CPU)
# =============================================================================
# Starts all services: Manager, Worker (CPU), Orchestrator, and 2x PostgreSQL.
#
# Usage:
#   cp .env.example .env    # fill in required values
#   docker compose up -d
#
# Services:
#   - Manager API:      http://localhost:9982  (Swagger: http://localhost:9982/swagger)
#   - Orchestrator API: http://localhost:9983  (Swagger: http://localhost:9983/swagger)
#   - Worker API:       internal only (port 4885)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Storage init - chowns shared volume to app user (UID/GID 1654) so that
  # the non-root Manager and Worker containers can write to it. Runs once
  # on startup, exits. Manager and Worker wait for it via depends_on.
  # ---------------------------------------------------------------------------
  smart-redact-storage-init:
    image: alpine:3
    container_name: smart-redact-storage-init
    user: "0:0"
    command: ["sh", "-c", "chown -R 1654:1654 /app/storage_folder /app/logs && chmod -R u+rwX,g+rwX /app/storage_folder /app/logs"]
    volumes:
      - storage:/app/storage_folder
      - logs:/app/logs
    restart: "no"

  # ---------------------------------------------------------------------------
  # Manager - Client-facing API for files and jobs
  # ---------------------------------------------------------------------------
  smart-redact-manager:
    image: pdftoolsag/smart-redact-manager:${VERSION:-latest}
    container_name: smart-redact-manager
    ports:
      - "9982:9982"
    environment:
      ServiceCommunication__ConnectionString: "http://smart-redact-worker:4885/"
      Database__DatabaseType: "PostgreSql"
      Database__ConnectionString: "User ID=smartredact;Password=smartredact;Server=smart-redact-manager-db;Port=5432;Database=smartredact;Maximum Pool Size=50;Timeout=30;"
      FileStorage__FileStorageType: "HostFileSystem"
      FileStorage__FilesDirectoryPath: "/app/storage_folder"
      Encryption__EncryptionKey: "${ENCRYPTION_KEY}"
      Encryption__DekTokenTtlMinutes: 1440
      Licensing__LicenseKey: "${PII_SERVICE_LICENSE_KEY}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_EXPORTER_OTLP_PROTOCOL: "${OTEL_EXPORTER_OTLP_PROTOCOL:-}"
    volumes:
      - storage:/app/storage_folder
      - logs:/app/logs
    networks:
      - smart-redact-network
    restart: unless-stopped
    depends_on:
      smart-redact-manager-db:
        condition: service_healthy
      smart-redact-worker:
        condition: service_healthy
      smart-redact-storage-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9982/healthz/ready"]
      interval: 10s
      timeout: 15s
      start_period: 30s
      retries: 30

  # ---------------------------------------------------------------------------
  # Worker - PII detection and redaction engine (CPU)
  # ---------------------------------------------------------------------------
  smart-redact-worker:
    image: pdftoolsag/smart-redact-worker:${VERSION:-latest}
    container_name: smart-redact-worker
    expose:
      - "4885"
    environment:
      Licensing__LicenseKey: "${PII_SERVICE_LICENSE_KEY}"
      Encryption__EncryptionKey: "${ENCRYPTION_KEY}"
      Encryption__DekTokenTtlMinutes: 1440
      FileStorage__FileStorageType: "HostFileSystem"
      FileStorage__FilesDirectoryPath: "/app/storage_folder"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_EXPORTER_OTLP_PROTOCOL: "${OTEL_EXPORTER_OTLP_PROTOCOL:-}"
    volumes:
      - storage:/app/storage_folder
      - logs:/app/logs
    networks:
      - smart-redact-network
    restart: unless-stopped
    depends_on:
      smart-redact-storage-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4885/healthz/ready"]
      interval: 10s
      timeout: 30s
      start_period: 60s
      retries: 30

  # ---------------------------------------------------------------------------
  # Orchestrator - Web UI backend, user management, JWT auth
  # ---------------------------------------------------------------------------
  smart-redact-orchestrator:
    image: pdftoolsag/smart-redact-orchestrator:${VERSION:-latest}
    container_name: smart-redact-orchestrator
    ports:
      - "9983:9983"
    environment:
      ManagerApi__BaseUrl: "http://smart-redact-manager:9982/"
      ManagerApi__PollingIntervalSeconds: 3
      Database__DatabaseType: "PostgreSql"
      Database__ConnectionString: "User ID=smartredact;Password=smartredact;Server=smart-redact-orchestrator-db;Port=5432;Database=smartredact;Maximum Pool Size=50;Timeout=30;"
      Jwt__SecretKey: "${ORCHESTRATOR_JWT_SECRET}"
      Licensing__LicenseKey: "${PII_SERVICE_LICENSE_KEY}"
    volumes:
      - logs:/app/logs
    networks:
      - smart-redact-network
    restart: unless-stopped
    depends_on:
      smart-redact-orchestrator-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9983/healthz/ready"]
      interval: 10s
      timeout: 15s
      start_period: 30s
      retries: 30

  # ---------------------------------------------------------------------------
  # PostgreSQL - Manager database
  # ---------------------------------------------------------------------------
  smart-redact-manager-db:
    image: postgres:15-alpine
    container_name: smart-redact-manager-db
    environment:
      POSTGRES_USER: smartredact
      POSTGRES_PASSWORD: smartredact
      POSTGRES_DB: smartredact
      TZ: UTC
    expose:
      - "5432"
    volumes:
      - pgdata-manager:/var/lib/postgresql/data
    networks:
      - smart-redact-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "smartredact"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # PostgreSQL - Orchestrator database
  # ---------------------------------------------------------------------------
  smart-redact-orchestrator-db:
    image: postgres:15-alpine
    container_name: smart-redact-orchestrator-db
    environment:
      POSTGRES_USER: smartredact
      POSTGRES_PASSWORD: smartredact
      POSTGRES_DB: smartredact
      TZ: UTC
    expose:
      - "5432"
    volumes:
      - pgdata-orchestrator:/var/lib/postgresql/data
    networks:
      - smart-redact-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "smartredact"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  storage:
  logs:
  pgdata-manager:
  pgdata-orchestrator:

networks:
  smart-redact-network:
    driver: bridge
