# =============================================================================
# OpenTelemetry Collector - New Relic Exporter
# =============================================================================
# Merge these sections into your otel-collector-config.yaml to export
# Smart Redact telemetry to New Relic via OTLP.
#
# Prerequisites:
#   - A New Relic account with an Ingest License Key
#     (found under: API Keys > INGEST - LICENSE)
#
# Documentation:
#   https://docs.newrelic.com/docs/opentelemetry/best-practices/opentelemetry-otlp/
# =============================================================================

# Add this under the top-level "exporters:" section
exporters:
  otlphttp/new-relic:
    # New Relic OTLP endpoint. Choose the one matching your account region:
    #   US: https://otlp.nr-data.net
    #   EU: https://otlp.eu01.nr-data.net
    endpoint: "https://otlp.nr-data.net"

    headers:
      # Your New Relic Ingest License Key.
      # Use an environment variable for security:
      #   "api-key": "${env:NEW_RELIC_LICENSE_KEY}"
      "api-key": "YOUR_NEW_RELIC_LICENSE_KEY"

# Replace or merge with your existing "service.pipelines:" section
service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/new-relic]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/new-relic]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/new-relic]
