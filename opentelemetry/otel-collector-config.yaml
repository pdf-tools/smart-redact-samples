# =============================================================================
# OpenTelemetry Collector Configuration for Smart Redact
# =============================================================================
# This is a baseline configuration that receives telemetry from Smart Redact
# services and exports it to the console (debug exporter). Use this as a
# starting point and add your preferred backend exporter below.
#
# Smart Redact services emit: traces, metrics, and logs.
# =============================================================================

# -----------------------------------------------------------------------------
# Receivers - How the collector ingests telemetry data
# -----------------------------------------------------------------------------
# The OTLP receiver accepts data from Smart Redact services over both gRPC
# and HTTP. Smart Redact sends telemetry to whichever protocol is configured
# via OTEL_EXPORTER_OTLP_PROTOCOL (default: grpc).
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317    # gRPC endpoint (used when OTEL_EXPORTER_OTLP_PROTOCOL=grpc)
      http:
        endpoint: 0.0.0.0:4318    # HTTP endpoint (used when OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf)

# -----------------------------------------------------------------------------
# Processors - Transform and batch telemetry before export
# -----------------------------------------------------------------------------
# The batch processor groups telemetry into batches to reduce the number of
# outgoing requests to your backend, improving throughput and efficiency.
processors:
  batch:
    send_batch_size: 1024          # Max number of items per batch
    send_batch_max_size: 2048      # Absolute max (prevents oversized batches)
    timeout: 5s                    # Send a batch after this duration even if not full

# -----------------------------------------------------------------------------
# Exporters - Where telemetry data is sent
# -----------------------------------------------------------------------------
# The debug exporter prints telemetry to the collector's stdout. This is useful
# for verifying that Smart Redact is sending data correctly.
exporters:
  debug:
    verbosity: basic               # Options: basic, normal, detailed

  # ---------------------------------------------------------------------------
  # Example: OTLP/gRPC exporter (uncomment and configure for your backend)
  # ---------------------------------------------------------------------------
  # otlp:
  #   endpoint: "your-backend:4317"
  #   tls:
  #     insecure: false
  #   headers:
  #     "Authorization": "Bearer YOUR_API_KEY"

  # ---------------------------------------------------------------------------
  # Example: OTLP/HTTP exporter (uncomment and configure for your backend)
  # ---------------------------------------------------------------------------
  # otlphttp:
  #   endpoint: "https://your-backend.example.com"
  #   headers:
  #     "Authorization": "Bearer YOUR_API_KEY"

  # ---------------------------------------------------------------------------
  # Example: Prometheus exporter for metrics (uncomment to enable)
  # ---------------------------------------------------------------------------
  # prometheus:
  #   endpoint: "0.0.0.0:8889"    # Prometheus can scrape this endpoint
  #   namespace: "smart_redact"

# -----------------------------------------------------------------------------
# Service - Wires receivers, processors, and exporters into pipelines
# -----------------------------------------------------------------------------
# Each pipeline processes one signal type (traces, metrics, or logs).
# To add a backend exporter, include it in the appropriate pipeline(s).
service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]           # Add your exporter here, e.g.: [debug, otlp]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]           # Add your exporter here, e.g.: [debug, otlp]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]           # Add your exporter here, e.g.: [debug, otlp]

  # Collector's own telemetry (health/metrics about the collector itself)
  telemetry:
    logs:
      level: info                  # Collector log level: debug, info, warn, error
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888         # Collector's internal metrics endpoint
